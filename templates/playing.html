<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckCastDJ Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            /* Removed body padding to maximize screen real estate */
            padding: 0; 
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Try to prevent scrolling */
        }

        .player-container {
            width: 100%;
            height: 100%;
            background: #111;
            /* Drastically reduced padding (was 30px) */
            padding: 10px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .video-info {
            text-align: center;
            /* Reduced margin (was 30px) */
            margin-bottom: 5px; 
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .video-title {
            /* RESTORED SIZE */
            font-size: 2.5rem; 
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-info {
            /* RESTORED SIZE */
            font-size: 2.5rem;
            font-weight: bold; 
            color: #aaa;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Reduced gap (was 40px) */
            gap: 10px; 
            flex-grow: 1;
            align-items: center;
            /* Ensure the grid itself doesn't overflow if possible */
            min-height: 0; 
            margin-bottom: 5px;
        }

        .media-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Reduced gap (was 40px) */
            gap: 10px; 
            height: 100%;
        }

        .thumbnail-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
            width: 100%;
            /* RESTORED SIZES */
            max-width: 500px; 
            min-height: 375px; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .thumbnail-container img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 15px;
        }

        .vu-meter-container {
            background: #1a1a1a;
            border-radius: 15px;
            /* Reduced padding (was 30px) */
            padding: 15px; 
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .vu-meter-title {
            text-align: center;
            margin-bottom: 10px; /* Reduced from 20px */
            /* RESTORED SIZE */
            font-size: 1.6rem; 
            color: #ddd;
        }

        .vu-meter {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .channel {
            flex: 1;
            text-align: center;
        }

        .channel-label {
            color: #ffffff;
            /* RESTORED SIZE */
            font-size: 1.2rem; 
            margin-bottom: 5px;
            font-weight: bold;
        }

        .meter-bar {
            /* RESTORED SIZE */
            height: 40px; 
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
        }

        .leds {
            display: flex;
            height: 100%;
            padding: 2px;
            gap: 2px;
        }

        .led {
            flex: 1;
            background: #111;
            border-radius: 3px;
            transition: all 0.1s ease;
        }

        .led.active {
            background: linear-gradient(to bottom, #00ff00, #00cc00);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.7);
        }

        .led.active.warning {
            background: linear-gradient(to bottom, #ffff00, #cccc00);
            box-shadow: 0 0 8px rgba(255, 255, 0, 0.7);
        }

        .led.active.danger {
            background: linear-gradient(to bottom, #ff0000, #cc0000);
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.7);
        }

        .peak-indicators {
            display: flex;
            gap: 15px;
        }

        .peak-indicator {
            flex: 1;
            text-align: center;
        }

        .peak-label {
            /* RESTORED SIZE */
            font-size: 1rem; 
            color: #aaa;
            margin-bottom: 2px;
        }

        .meter-peak {
            /* RESTORED SIZE */
            height: 10px; 
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .peak-level {
            height: 100%;
            background: #ff4444;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Ensure it doesn't force scroll if content is tight */
            overflow: hidden; 
        }

        .qr-container {
            background: white;
            /* Reduced padding (was 30px) */
            padding: 10px; 
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
            /* Allow QR container to shrink if absolutely necessary to fit screen */
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode img {
            border-radius: 10px;
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .tracklist {
            color: #ffffff;
            margin-top: 5px; /* Reduced margin */
            /* RESTORED SIZE */
            font-size: 1.4rem; 
            min-height: 1.5em;
            padding: 10px 0; /* Reduced padding */
            background: #1a1a1a;
            border-radius: 10px;
            white-space: nowrap;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .tracklist-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee-scroller 25s linear infinite;
        }

        .tracklist-content .highlight {
            color: #ffcc00;
            font-weight: bold;
        }

        @keyframes marquee-scroller {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
                gap: 10px;
                overflow-y: auto;
            }
            
            /* Scale down text slightly ONLY on mobile/portrait to prevent breakage */
            .video-title {
                font-size: 1.8rem; 
            }
            
            .track-info {
                font-size: 1.2rem;
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    
    <div class="player-container">
        <div class="video-info">
            <div class="video-title" id="videoTitle">No Video Playing (DeckCastDJ v1.16.8) ...</div>
            <div class="track-info">
                <span id="track">Track # 0</span>
                <span id="timer">00:00:00</span>
            </div>
        </div>
        
        <div class="content-grid">
            <div class="media-section">
                <div class="thumbnail-container">
                    <img id="videoThumbnail" src="https://upload.wikimedia.org/wikipedia/commons/8/8b/YouTube_dark_icon_%282017%29.svg" alt="Video Thumbnail">
                </div>
                
                <div class="vu-meter-container">
                    <div class="vu-meter-title">AUDIO LEVELS</div>
                    <div class="vu-meter">
                        <div class="channel">
                            <div class="channel-label">LEFT</div>
                            <div class="meter-bar">
                                <div class="leds" id="leftMeter"></div>
                            </div>
                        </div>
                        <div class="channel">
                            <div class="channel-label">RIGHT</div>
                            <div class="meter-bar">
                                <div class="leds" id="rightMeter"></div>
                            </div>
                        </div>
                    </div>
                    <div class="peak-indicators">
                        <div class="peak-indicator">
                            <div class="peak-label">L PEAK</div>
                            <div class="meter-peak">
                                <div class="peak-level" id="leftPeak"></div>
                            </div>
                        </div>
                        <div class="peak-indicator">
                            <div class="peak-label">R PEAK</div>
                            <div class="meter-peak">
                                <div class="peak-level" id="rightPeak"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="qr-section">
                <div class="qr-container">
                    <div id="qrcode"></div>
                </div>
            </div>
        </div>
        
        <div class="tracklist" id="tracklist">
            <div id="tracklist-content" class="tracklist-content"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" xintegrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // VU Meter functionality
        class VUMeter {
            constructor(leftMeterId, rightMeterId, leftPeakId, rightPeakId) {
                this.leftMeter = document.getElementById(leftMeterId);
                this.rightMeter = document.getElementById(rightMeterId);
                this.leftPeak = document.getElementById(leftPeakId);
                this.rightPeak = document.getElementById(rightPeakId);
                
                this.ledCount = 16;
                this.leftLevel = 0;
                this.rightLevel = 0;
                this.leftPeakLevel = 0;
                this.rightPeakLevel = 0;
                this.peakHoldTime = 0;
                this.animationId = null;
                
                // add variable to keep track of how many time mic reads have failed since last success
                this.micFailCount = 0;

                /* --- CARDPUTER MODIFICATION START --- */
                // Config for external microphone
                this.cardputerIP = "192.168.1.57"; // Default IP from previous context
                this.isUsingCardputer = false;
                this.lastPacketTime = 0;
                this.micTargetLevel = 0;
                
                // Start the polling loop separate from animation frame
                this.startMicPolling();
                /* --- CARDPUTER MODIFICATION END --- */

                this.initMeters();
                this.startAnimation();
            }
            
            /* --- CARDPUTER MODIFICATION START --- */
            startMicPolling() {
                setInterval(() => {
                    fetch(`http://${this.cardputerIP}/data`)
                        .then(response => response.json())
                        .then(json => {
                            this.processMicData(json.data);
                            this.isUsingCardputer = true;
                            this.lastPacketTime = Date.now();
                        })
                        .catch(err => {
                            // INCREMENT FAIL COUNT
                            this.micFailCount++;

                            // print to console every 40 failures, ~ 2 sec, to avoid spamming
                            if(this.micFailCount % 40 === 0) {
                                console.log("Mic fetch failed # " + this.micFailCount);
                            }
                        });
                }, 50); // Poll every 50ms
            }

            processMicData(data) {
                // Find peak amplitude in the raw audio buffer
                let maxVal = 0;
                for (let v of data) {
                    if (Math.abs(v) > maxVal) maxVal = Math.abs(v);
                }
                
                // Normalize: Raw inputs can be ~10k-20k. 
                // Applying a gain of 4.0 and dividing by 18000 (calibration value)
                let vol = (maxVal * 4.0) / 18000;
                if (vol > 1.0) vol = 1.0;
                
                this.micTargetLevel = vol;
            }
            /* --- CARDPUTER MODIFICATION END --- */

            initMeters() {
                // Create LED elements for both channels
                for (let i = 0; i < this.ledCount; i++) {
                    const leftLed = document.createElement('div');
                    const rightLed = document.createElement('div');
                    
                    leftLed.className = 'led';
                    rightLed.className = 'led';
                    
                    this.leftMeter.appendChild(leftLed);
                    this.rightMeter.appendChild(rightLed);
                }
            }
            
            updateMeters() {
                /* --- CARDPUTER MODIFICATION START --- */
                // Check if we have recent data (timeout 2 seconds)
                if (Date.now() - this.lastPacketTime > 2000) {
                    this.isUsingCardputer = false;
                }

                if (this.isUsingCardputer) {
                    // --- REAL MIC DATA MODE ---
                    // Smooth attack/decay for the mic data
                    // Move current level 20% closer to target level every frame
                    this.leftLevel += (this.micTargetLevel - this.leftLevel) * 0.2;
                    
                    // Copy left to right (Mono Mic Source)
                    this.rightLevel = this.leftLevel;

                    // Clamp values just in case
                    this.leftLevel = Math.max(0, Math.min(1, this.leftLevel));
                    this.rightLevel = Math.max(0, Math.min(1, this.rightLevel));

                } else {
                    // --- ORIGINAL RANDOM FALLBACK MODE ---
                    // Simulate random audio levels
                    this.leftLevel = Math.min(1, Math.max(0, this.leftLevel + (Math.random() - 0.5) * 0.3));
                    this.rightLevel = Math.min(1, Math.max(0, this.rightLevel + (Math.random() - 0.5) * 0.3));
                }
                /* --- CARDPUTER MODIFICATION END --- */
                
                // Update peak levels
                this.leftPeakLevel = Math.max(this.leftPeakLevel - 0.005, this.leftLevel);
                this.rightPeakLevel = Math.max(this.rightPeakLevel - 0.005, this.rightLevel);
                
                // Update peak hold display
                this.peakHoldTime++;
                if (this.peakHoldTime > 60) { // Reset peaks every 60 frames (~1 second)
                    this.leftPeakLevel = this.leftLevel;
                    this.rightPeakLevel = this.rightLevel;
                    this.peakHoldTime = 0;
                }
                
                // Update LED displays
                this.updateChannel(this.leftMeter, this.leftLevel, this.leftPeak);
                this.updateChannel(this.rightMeter, this.rightLevel, this.rightPeak);
            }
            
            updateChannel(meterElement, level, peakElement) {
                const leds = meterElement.children;
                const activeLeds = Math.floor(level * this.ledCount);
                const peakPosition = Math.floor(this.leftPeakLevel * this.ledCount);
                
                for (let i = 0; i < this.ledCount; i++) {
                    if (i < activeLeds) {
                        if (i < this.ledCount * 0.7) {
                            leds[i].className = 'led active';
                        } else if (i < this.ledCount * 0.9) {
                            leds[i].className = 'led active warning';
                        } else {
                            leds[i].className = 'led active danger';
                        }
                    } else {
                        leds[i].className = 'led';
                    }
                }
                
                // Update peak indicator
                peakElement.style.width = `${(peakPosition / this.ledCount) * 100}%`;
            }
            
            startAnimation() {
                const animate = () => {
                    this.updateMeters();
                    this.animationId = requestAnimationFrame(animate);
                };
                animate();
            }
        }
        
        // Socket.io functionality
        var clientId = "";
        var playerClientId = null;
        var videoTitleElement = document.getElementById("videoTitle");
        var videoThumbnailElement = document.getElementById("videoThumbnail");
        var currentVideoId = "";
        var videoTrack = 0;
        var myTimer;
        var tracklist;
        var totalPlayTime = 0;
        
        var serverUrl = 'http://' + document.domain + ':' + location.port;
        var socket = io(serverUrl);
        
        // Initialize VU Meter when page loads
        let vuMeter;
        document.addEventListener('DOMContentLoaded', function() {
            vuMeter = new VUMeter('leftMeter', 'rightMeter', 'leftPeak', 'rightPeak');
            
            // Generate initial QR code
            var qrURL = serverUrl + "/mix/" + clientId;
            document.getElementById('qrcode').innerHTML = '';
            var qrcode = new QRCode("qrcode", {
                text: qrURL,
                width: 400,
                height: 400,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });
        
        socket.on('connect', function() { 
            clientId = socket.io.engine.id; 

            socket.emit('my event', {
                data: 'Video Info Client Connected',
                uname: clientId
            });
        });
        
        socket.on('my response', function(msg) {
            if("clientId" in msg) {
                if(playerClientId === null) {
                    playerClientId = msg.clientId;
                }
                
                if(msg.clientId == playerClientId) {
                    processMessage(msg);
                }
            }
        });

        function processMessage(msg) {
            var msgText = msg.data;
            var videoId = msg.videoId;
            var trackList = msg.trackList;

            if("trackNum" in msg) {
                videoTrack = msg.trackNum;
            }
            
            // Expecting JSON data from server with videoTitle, videoThumbnail, and backupThumbnail
            if("videoTitle" in msg && "videoThumbnail" in msg) {
                // Update video title
                videoTitleElement.textContent = msg.videoTitle;
                
                // Update video thumbnail with error handling
                videoThumbnailElement.src = msg.videoThumbnail;
                videoThumbnailElement.onerror = function() {
                    if (msg.backupThumbnail) {
                        this.src = msg.backupThumbnail;
                    }
                };
                
                // Generate QR code
                var qrURL = serverUrl + "/mix/" + clientId;
                document.getElementById('qrcode').innerHTML = '';
                var qrcode = new QRCode("qrcode", {
                    text: qrURL,
                    width: 400,
                    height: 400,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                if(videoId != currentVideoId) {
                    currentVideoId = videoId;
                    
                    var jsonText = {
                        data: 'New Video Track',
                        track: videoTrack,
                        clientId: clientId,
                        videoId: currentVideoId,
                        trackAt: toTime(totalPlayTime),
                        videoTitle: msg.videoTitle,
                        videoFormat: msg.videoFormat,
                        videoUrl: msg.videoUrl,
                        videoImg: msg.videoThumbnail
                    };
                    socket.emit('my event', jsonText);

                    // clear the tracklist text
                    var scrollerContent = document.getElementById("tracklist-content");
                    if (scrollerContent) {
                        scrollerContent.innerHTML = "";
                        scrollerContent.removeAttribute("data-text");
                    }
                }
                
                var trackOutput = document.getElementById("track");

                if(videoTrack != -1) {
                    trackOutput.innerHTML = "Track # " + videoTrack;
                } else {
                    videoTrack++;
                    trackOutput.innerHTML = "Track # 1";
                }
                
                // reset the myTimer interval
                clearInterval(myTimer);

                startCount(msg.videoTime, msg.ctime, trackList);
            } else if(msgText === "RELOAD_PLAYING") { 
                location.reload();  
            }
        }
        
        function startCount(totalSeconds, currentTime, trackList) {
            var timerOutput = document.getElementById("timer");
            
            var currentSeconds = currentTime; 
            
            // Set initial state immediately
            if (trackList && trackList.length > 0) {
                updateTracklistScroller(currentSeconds, totalSeconds, trackList);
            }
                     
            myTimer = setInterval(count, 1000);
            
            function count() {  
                currentSeconds++;
                
                if (trackList && trackList.length > 0) {
                    updateTracklistScroller(currentSeconds, totalSeconds, trackList);
                }
                
                if(currentSeconds <= totalSeconds) {
                    totalPlayTime++;

                    if(videoTrack > 1) {
                        timerOutput.innerHTML = toTime(currentSeconds) + " / " + toTime(totalSeconds) + " | " + toTime(totalPlayTime);
                    } else {
                        timerOutput.innerHTML = toTime(currentSeconds) + " / " + toTime(totalSeconds);
                    }
                } else {
                    timerOutput.innerHTML = "TRACK DONE ...";
                }
            }
        }

        function updateTracklistScroller(currentSeconds, totalSeconds, trackList) {
            var scrollerContent = document.getElementById("tracklist-content");
            if (!scrollerContent) return;
            
            if (totalSeconds <= 0 || isNaN(totalSeconds)) {
                totalSeconds = 300; // Fallback to 5 minutes so calculations work for cued/unstarted videos
            }
            
            var trackDisplay = getStatelessTrackDisplay(currentSeconds, totalSeconds, trackList);
            
            if (scrollerContent.getAttribute("data-text") !== trackDisplay) {
                scrollerContent.setAttribute("data-text", trackDisplay);
                
                var step = totalSeconds / trackList.length;
                var index = Math.floor(currentSeconds / step);
                if (index < 0) index = 0;
                if (index >= trackList.length) index = trackList.length - 1;
                
                var parts = [];
                if (index > 0) {
                    parts.push(`<span style="opacity: 0.65;">Prev: ${trackList[index - 1]}</span>`);
                }
                parts.push(`<span class="highlight">★ NOW PLAYING: ${trackList[index]} ★</span>`);
                if (index < trackList.length - 1) {
                    parts.push(`<span style="opacity: 0.75;">Next: ${trackList[index + 1]}</span>`);
                }
                
                scrollerContent.innerHTML = parts.join(" &nbsp; &nbsp; | &nbsp; &nbsp; ");
            }
        }
        
        function getStatelessTrackDisplay(currentSeconds, totalSeconds, trackList) {
            if (!trackList || trackList.length === 0 || totalSeconds <= 0) return "";
            
            var step = totalSeconds / trackList.length;
            var index = Math.floor(currentSeconds / step);
            if (index < 0) index = 0;
            if (index >= trackList.length) index = trackList.length - 1;
            
            var parts = [];
            if (index > 0) {
                parts.push("Prev: " + trackList[index - 1]);
            }
            parts.push("★ NOW PLAYING: " + trackList[index] + " ★");
            if (index < trackList.length - 1) {
                parts.push("Next: " + trackList[index + 1]);
            }
            return parts.join("   |   ");
        }

        function toTime(seconds) {
            var date = new Date(null);
            date.setSeconds(seconds);
            return date.toISOString().substr(11, 8);
        }
    </script>
</body>
</html>
